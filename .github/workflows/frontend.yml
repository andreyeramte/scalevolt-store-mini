name: Frontend CI

on:
  push:
    paths:
      - 'vue-frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'vue-frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run format -- --check || echo "Formatting issues found"
      - run: npm test
      - run: npm run build 