version: '3.8'

services:
  # vue-frontend:
  #   build: ./vue-frontend
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./vue-frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - node-backend
  #   command: npm run serve
  #   environment:
  #     - NODE_ENV=development
  #     - VUE_APP_API_URL=http://node-backend:4242

  node-backend:
    build: ./node-backend/backend-node
    ports:
      - "4242:3002"
      - "1337:1337"  # Added for your Stripe API
    volumes:
      - ./node-backend/backend-node:/app
      - /app/node_modules
    depends_on:
      - postgres  # Added PostgreSQL dependency
    command: npm start  # Changed from npm run dev to npm start
    environment:
      - NODE_ENV=development
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=scalevolt
      - STRIPE_SECRET_KEY=sk_test_your_stripe_key_here
      - STRIPE_API_VERSION=2023-10-16
      - DOMAIN=http://localhost:3000

  postgres:
    image: postgres:14
    container_name: scalevolt-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scalevolt
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./node-backend/backend-node/db:/docker-entrypoint-initdb.d

volumes:
  postgres_data: